  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: #fafaf8;
  }
  body { display: flex; flex-direction: column; }

  /* ===== 调节栏 ===== */
  .tuner {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: #f5f5f2;
    border-bottom: 1px solid #eee;
  }
  .tuner .param {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tuner .param .name {
    font-size: 10px;
    color: #aaa;
    flex-shrink: 0;
  }
  .tuner .param input[type=range] {
    flex: 1;
    min-width: 0;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #ddd;
    border-radius: 2px;
    outline: none;
  }
  .tuner .param input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #d97706;
    border: none;
    cursor: pointer;
  }
  .tuner .param .val {
    font-size: 11px;
    color: #888;
    min-width: 34px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ===== 主体 ===== */
  .main {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 1px;
    background: #e8e8e4;
  }

  .panel {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: #fefefc;
    transition: flex 0.25s ease;
  }

  .head {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    padding: 0 8px 0 12px;
    background: #fafaf8;
    border-bottom: 1px solid #eee;
    gap: 6px;
  }
  .head .label { font-size: 12px; font-weight: 500; color: #999; }
  .head .count { font-size: 11px; color: #bbb; }

  /* 展开按钮 */
  .head .expand-btn {
    height: 26px;
    width: 26px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #bbb;
    font-size: 14px;
    cursor: pointer;
    -webkit-appearance: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .head .expand-btn:active { background: #eee; color: #888; }

  /* 展开状态：当前面板占满 */
  .main.expanded .panel { display: none; }
  .main.expanded .panel.active {
    display: flex;
    flex: 1;
  }
  .panel.active .head {
    background: #faf6f0;
    border-bottom-color: #f0e6d2;
  }
  .panel.active .head .label { color: #d97706; }

  /* 收起按钮 */
  .panel.active .expand-btn { color: #d97706; }

  .editor {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .editor .content {
    min-height: 100%;
    padding: 14px 12px;
    font-family: "FZYouSong", "PingFang SC", "Microsoft YaHei", serif;
    color: #1a1a1a;
    outline: none;
    -webkit-appearance: none;
    caret-color: #d97706;
  }
  .editor .content:empty::before {
    content: "输入或粘贴…";
    color: #ccc;
  }

  .editor .content p {
    margin-bottom: var(--para-spacing, 0.5em);
    font-size: var(--font-size, 16px);
    line-height: var(--line-height, 1.8);
  }
  .editor .content p:last-child { margin-bottom: 0; }

  /* ===== 底部 ===== */
  .foot {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    height: 44px;
    padding: 0 16px;
    background: #fafaf8;
    border-top: 1px solid #eee;
  }
  .foot .clear-btn {
    height: 30px;
    padding: 0 16px;
    border: 1px solid #e0e0dc;
    border-radius: 6px;
    background: #fff;
    font-size: 12px;
    color: #777;
    cursor: pointer;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .foot .clear-btn:active { background: #f0f0ec; }
  .foot .info {
    font-size: 11px;
    color: #bbb;
    min-width: 60px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="tuner">
  <div class="param">
    <span class="name">字号</span>
    <input type="range" id="slFs" min="12" max="28" value="16" step="1">
    <span class="val" id="valFs">16px</span>
  </div>
  <div class="param">
    <span class="name">行距</span>
    <input type="range" id="slLh" min="12" max="28" value="18" step="1">
    <span class="val" id="valLh">1.8</span>
  </div>
  <div class="param">
    <span class="name">段距</span>
    <input type="range" id="slPs" min="0" max="15" value="5" step="1">
    <span class="val" id="valPs">0.5em</span>
  </div>
</div>

<div class="main" id="main">
  <div class="panel" id="panelA">
    <div class="head">
      <span class="label">版本 A</span>
      <span class="count" id="cntA">0 字</span>
      <button class="expand-btn" id="btnExpandA" title="展开全屏">⤢</button>
    </div>
    <div class="editor">
      <div class="content" id="edA" contenteditable="true"></div>
    </div>
  </div>

  <div class="panel" id="panelB">
    <div class="head">
      <span class="label">版本 B</span>
      <span class="count" id="cntB">0 字</span>
      <button class="expand-btn" id="btnExpandB" title="展开全屏">⤢</button>
    </div>
    <div class="editor">
      <div class="content" id="edB" contenteditable="true"></div>
    </div>
  </div>
</div>

<div class="foot">
  <button class="clear-btn" id="btnClearA">清空左侧</button>
  <span class="info" id="info">共 0 字</span>
  <button class="clear-btn" id="btnClearB">清空右侧</button>
</div>

<script>
var edA = document.getElementById('edA');
var edB = document.getElementById('edB');
var cntA = document.getElementById('cntA');
var cntB = document.getElementById('cntB');
var info = document.getElementById('info');
var main = document.getElementById('main');
var panelA = document.getElementById('panelA');
var panelB = document.getElementById('panelB');

var slFs = document.getElementById('slFs');
var slLh = document.getElementById('slLh');
var slPs = document.getElementById('slPs');
var valFs = document.getElementById('valFs');
var valLh = document.getElementById('valLh');
var valPs = document.getElementById('valPs');

// ===== 设置 =====
var fs = 16, lh = 18, ps = 5;
try {
  var saved = JSON.parse(localStorage.getItem('cmp_settings'));
  if (saved) { fs = saved.fs; lh = saved.lh; ps = saved.ps; }
} catch(e) {}
slFs.value = fs; slLh.value = lh; slPs.value = ps;

function apply() {
  var fsV = parseInt(slFs.value);
  var lhV = parseInt(slLh.value) / 10;
  var psV = parseInt(slPs.value) / 10;
  document.querySelector(':root').style.setProperty('--font-size', fsV + 'px');
  document.querySelector(':root').style.setProperty('--line-height', lhV);
  document.querySelector(':root').style.setProperty('--para-spacing', psV + 'em');
  valFs.textContent = fsV + 'px';
  valLh.textContent = lhV.toFixed(1);
  valPs.textContent = psV.toFixed(1) + 'em';
  localStorage.setItem('cmp_settings', JSON.stringify({
    fs: parseInt(slFs.value), lh: parseInt(slLh.value), ps: parseInt(slPs.value)
  }));
}
slFs.addEventListener('input', apply);
slLh.addEventListener('input', apply);
slPs.addEventListener('input', apply);
apply();

// ===== 展开/收起 =====
var expanded = null; // 'A' | 'B' | null

function expand(side) {
  if (expanded === side) {
    // 已经展开 → 收起
    expanded = null;
    main.classList.remove('expanded');
    panelA.classList.remove('active');
    panelB.classList.remove('active');
    document.getElementById('btnExpandA').textContent = '⤢';
    document.getElementById('btnExpandB').textContent = '⤢';
  } else {
    // 展开
    expanded = side;
    main.classList.add('expanded');
    if (side === 'A') {
      panelA.classList.add('active');
      panelB.classList.remove('active');
      document.getElementById('btnExpandA').textContent = '⤓';
      document.getElementById('btnExpandB').textContent = '⤢';
    } else {
      panelB.classList.add('active');
      panelA.classList.remove('active');
      document.getElementById('btnExpandB').textContent = '⤓';
      document.getElementById('btnExpandA').textContent = '⤢';
    }
  }
}

document.getElementById('btnExpandA').addEventListener('click', function(e) {
  e.preventDefault();
  expand('A');
});
document.getElementById('btnExpandB').addEventListener('click', function(e) {
  e.preventDefault();
  expand('B');
});

// ===== 字数 =====
function wc(t) { return t.replace(/\s/g, '').length; }
function updateCounts() {
  var ca = wc(edA.textContent);
  var cb = wc(edB.textContent);
  cntA.textContent = ca + ' 字';
  cntB.textContent = cb + ' 字';
  info.textContent = '共 ' + (ca + cb) + ' 字';
}
edA.addEventListener('input', updateCounts);
edB.addEventListener('input', updateCounts);

// 回车规范化
function wrapParas(el) {
  var children = Array.from(el.childNodes);
  var needsFix = children.some(function(n) { return n.nodeType === 3 && n.textContent.trim(); });
  if (!needsFix && el.querySelector('div')) needsFix = true;
  if (!needsFix) return;
  var html = el.innerHTML
    .replace(/<div>/g, '<p>')
    .replace(/<\/div>/g, '</p>')
    .replace(/<br\s*\/?>/g, '')
    .replace(/<p><\/p>/g, '<p><br></p>');
  if (!/^<p>/.test(html.trim())) { html = '<p>' + html + '</p>'; }
  html = html.replace(/(<p><br><\/p>)+/g, '<p><br></p>');
  el.innerHTML = html;
  var range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
edA.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setTimeout(function() { wrapParas(edA); }, 0);
});
edB.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setTimeout(function() { wrapParas(edB); }, 0);
});

// 粘贴
function cleanPaste(el, e) {
  e.preventDefault();
  var text = (e.clipboardData || window.clipboardData).getData('text/plain');
  var paras = text.split(/\n\s*\n/);
  var html = paras.map(function(p) {
    p = p.replace(/\n/g, '<br>');
    return '<p>' + (p.trim() || '<br>') + '</p>';
  }).join('');
  document.execCommand('insertHTML', false, html);
}
edA.addEventListener('paste', function(e) { cleanPaste(edA, e); });
edB.addEventListener('paste', function(e) { cleanPaste(edB, e); });

// 自动保存
var st;
function autosave() {
  clearTimeout(st);
  st = setTimeout(function() {
    try {
      localStorage.setItem('cmp_a', edA.innerHTML);
      localStorage.setItem('cmp_b', edB.innerHTML);
    } catch(e) {}
  }, 500);
}
edA.addEventListener('input', autosave);
edB.addEventListener('input', autosave);

(function() {
  try {
    var a = localStorage.getItem('cmp_a');
    var b = localStorage.getItem('cmp_b');
    if (a) edA.innerHTML = a;
    if (b) edB.innerHTML = b;
    updateCounts();
  } catch(e) {}
})();

document.getElementById('btnClearA').onclick = function() {
  edA.innerHTML = ''; updateCounts(); localStorage.setItem('cmp_a', '');
};
document.getElementById('btnClearB').onclick = function() {
  edB.innerHTML = ''; updateCounts(); localStorage.setItem('cmp_b', '');
};
</script>
